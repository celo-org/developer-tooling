name: "Upload Codecov report"
description: "Fetches Codecov token and uploads report"
inputs:
  report-name:
    description: "Report name to use while uploading it"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Import Secrets from OpenBao
      if: github.ref_name == github.event.repository.default_branch
      id: get_codecov_token
      uses: hashicorp/vault-action@v3
      with:
        # Your OpenBao URL
        url: https://openbao.akeyless.celo-networks-dev.org
        # Authentication configuration
        method: jwt
        path: github
        role: celo-org_developer-tooling
        # Secrets to retrieve: <PATH> <KEY> | <ENV_VAR_NAME>
        secrets: |
          secrets/data/static-secrets/dev-tooling-circle/codecov/developer-tooling value | CODECOV_TOKEN
    # - name: Akeyless Get CODECOV_TOKEN Secrets
    #   id: get_codecov_token
    #   if: github.ref_name == github.event.repository.default_branch
    #   uses: docker://us-west1-docker.pkg.dev/devopsre/akeyless-public/akeyless-action:latest
    #   with:
    #     api-url: https://api.gateway.akeyless.celo-networks-dev.org
    #     access-id: p-kf9vjzruht6l
    #     static-secrets: '{"/static-secrets/dev-tooling-circle/codecov/developer-tooling":"CODECOV_TOKEN"}'
    - name: Upload coverage to Codecov
      if: github.ref_name == github.event.repository.default_branch
      uses: codecov/codecov-action@v5
      with:
        verbose: true
        name: ${{ inputs.report-name }}
      env:
        CODECOV_TOKEN: ${{ env.CODECOV_TOKEN }}

    - name: Upload coverage to Codecov
      if: github.ref_name != github.event.repository.default_branch
      uses: codecov/codecov-action@v5
      with:
        verbose: true
        name: ${{ inputs.report-name }}
